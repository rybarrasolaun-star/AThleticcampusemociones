<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:2rem}
.login-box{background:#fff;border-radius:20px;padding:2rem;width:100%;max-width:340px;text-align:center}
.login-logo{font-size:48px;margin-bottom:0.5rem}
.login-title{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.login-sub{font-size:14px;color:#888;margin-bottom:1.5rem}
.login-box input{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:16px;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:#3b82f6}
.btn-primary{width:100%;padding:13px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
.btn-primary:hover{background:#2563eb}
.login-error{color:#ef4444;font-size:13px;margin-top:8px;display:none}

/* HEADER */
.app-header{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:10}
.header-left{display:flex;flex-direction:column}
.header-title{font-size:16px;font-weight:700;color:#1a1a2e}
.header-sub{font-size:12px;color:#888}
.btn-logout{padding:6px 12px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;font-size:12px;color:#666;cursor:pointer}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e5e5e5;padding:0 16px}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:14px;font-weight:500;color:#888;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}

/* CONTENT */
.content{flex:1;padding:16px;overflow-y:auto}
.phase-banner{padding:10px 14px;border-radius:12px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.phase-banner.pre{background:#EFF6FF;color:#1d4ed8}
.phase-banner.post{background:#F0FDF4;color:#166534}

/* PLAYERS */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.player-btn{padding:14px 10px;border-radius:14px;border:1.5px solid #e5e5e5;background:#fff;cursor:pointer;text-align:center;position:relative;transition:all 0.15s}
.player-btn:active{transform:scale(0.97)}
.player-btn.done-pre{border-color:#3b82f6;background:#eff6ff}
.player-btn.done-both{border-color:#22c55e;background:#f0fdf4}
.player-name{font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:4px}
.player-status{font-size:12px;color:#888}
.player-dot{position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:50%}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:flex-end;justify-content:center;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:1.5rem 1rem 2rem;width:100%;max-width:480px}
.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 1.25rem}
.modal-name{font-size:22px;font-weight:700;text-align:center;color:#1a1a2e;margin-bottom:4px}
.modal-question{font-size:14px;color:#666;text-align:center;margin-bottom:6px}
.modal-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:1.25rem}
.badge-pre{background:#dbeafe;color:#1d4ed8}
.badge-post{background:#dcfce7;color:#166534}
.emotions-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:1rem}
.emo-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;border-radius:16px;border:1.5px solid #e5e5e5;background:#f9f9f9;cursor:pointer;transition:all 0.15s}
.emo-btn:active{transform:scale(0.94);background:#eff6ff;border-color:#3b82f6}
.emo-icon{font-size:40px;line-height:1}
.emo-label{font-size:11px;color:#555;font-weight:500;text-align:center}
.btn-cancel{width:100%;padding:12px;border:1.5px solid #e5e5e5;border-radius:12px;background:#fff;font-size:15px;color:#888;cursor:pointer}

/* SUCCESS */
.success-screen{text-align:center;padding:2rem 1rem}
.success-emo{font-size:80px;display:block;margin-bottom:1rem}
.success-name{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.success-label{font-size:14px;color:#888}

/* ADD PLAYER */
.add-row{display:flex;gap:8px;margin-bottom:14px}
.add-row input{flex:1;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none}
.add-row input:focus{border-color:#3b82f6}
.add-row button{padding:10px 16px;border:none;background:#3b82f6;color:#fff;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}

/* HISTORIAL */
.day-section{margin-bottom:1.5rem}
.day-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e5e5e5}
.record-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5}
.record-table th{padding:9px 10px;background:#f5f5f5;color:#666;font-weight:600;text-align:left}
.record-table td{padding:9px 10px;border-top:1px solid #f0f0f0;color:#1a1a2e}
.change-up{color:#22c55e;font-weight:700}
.change-dn{color:#ef4444;font-weight:700}
.change-eq{color:#888}
.empty{text-align:center;padding:3rem 1rem;color:#aaa;font-size:14px}

/* ADMIN */
#screen-admin{background:#f5f5f5}
.admin-header{background:#1a1a2e;color:#fff;padding:16px;display:flex;align-items:center;justify-content:space-between}
.admin-header h1{font-size:18px;font-weight:700}
.btn-logout-admin{padding:6px 12px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:transparent;color:#fff;font-size:12px;cursor:pointer}
.admin-content{padding:16px}
.admin-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.admin-tab{padding:7px 16px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;color:#555}
.admin-tab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.btn-export{display:flex;align-items:center;gap:6px;padding:10px 18px;background:#22c55e;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px}
.group-card{background:#fff;border-radius:14px;border:1px solid #e5e5e5;overflow:hidden;margin-bottom:12px}
.group-card-header{padding:12px 16px;background:#f9f9f9;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between}
.group-card-title{font-size:15px;font-weight:700;color:#1a1a2e}
.group-stats{font-size:12px;color:#888}

/* GESTIÓN DE GRUPOS */
.admin-section-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:10px;margin-top:4px}
.groups-manage-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.group-manage-row{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:10px 14px}
.group-manage-info{display:flex;flex-direction:column}
.group-manage-code{font-size:13px;font-weight:700;color:#1a1a2e;letter-spacing:1px}
.group-manage-name{font-size:12px;color:#888}
.btn-del-group{padding:5px 12px;background:#fff;border:1.5px solid #ef4444;color:#ef4444;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.btn-del-group:active{background:#fef2f2}
.add-group-form{background:#fff;border:1.5px solid #e0e0e0;border-radius:14px;padding:14px;margin-bottom:16px}
.add-group-form .form-row{display:flex;gap:8px;margin-bottom:8px}
.add-group-form input{flex:1;padding:9px 13px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none}
.add-group-form input:focus{border-color:#3b82f6}
.btn-add-group{padding:9px 18px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn-add-group:active{background:#3b82f6}
.admin-tab-groups{background:#3b82f6;color:#fff;border-color:#3b82f6}

/* ALERTAS TENDENCIA */
.alert-section{margin-bottom:16px}
.alert-title{font-size:14px;font-weight:700;color:#dc2626;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.alert-card{background:#fff7f7;border:1.5px solid #fca5a5;border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.alert-icon{font-size:22px;line-height:1;margin-top:1px}
.alert-body{flex:1}
.alert-name{font-size:14px;font-weight:700;color:#1a1a2e}
.alert-desc{font-size:12px;color:#ef4444;margin-top:2px}
.alert-days{font-size:11px;color:#888;margin-top:3px}

/* RESOLUCIÓN */
.resol-cell{padding:4px 6px!important}
.resol-input{width:100%;padding:5px 8px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:12px;font-family:inherit;resize:none;outline:none;background:#fffef0;min-height:34px}
.resol-input:focus{border-color:#3b82f6;background:#fff}
.resol-saved{font-size:11px;color:#22c55e;margin-top:2px;display:none}
</style>

function getWeekDays(){
  const today=new Date(),day=today.getDay(),mon=new Date(today);
  mon.setDate(today.getDate()-(day===0?6:day-1));
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({key,label:cap(d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'})),hasData:!!groupData[key]});
  }
  return days.filter(d=>d.hasData);
}

function renderSemana(){
  const days=getWeekDays();
  const el=document.getElementById('semana-content');
  if(!days.length){el.innerHTML='<div class="empty">Aún no hay registros esta semana</div>';return;}
  el.innerHTML=days.map(day=>{
    const dd=groupData[day.key]||{};
    const rows=players.filter(p=>dd[p]).map(p=>{
      const pd=dd[p],pre=pd.pre,post=pd.post;
      let change='—';
      if(pre&&post){const diff=post.score-pre.score;change=`<span class="${diff>0?'change-up':diff<0?'change-dn':'change-eq'}">${diff>0?'↑ Mejora':diff<0?'↓ Baja':'→ Igual'}</span>`;}
      return `<tr><td style="font-weight:600">${p}</td><td>${pre?`${pre.icon} ${pre.label}`:'—'}</td><td>${post?`${post.icon} ${post.label}`:'—'}</td><td>${change}</td></tr>`;

    return `<div class="day-section"><div class="day-title">📅 ${day.label}</div>

  }).join('');
}

// ─── ADMIN ───────────────────────────────────────────────────────
let adminAllData = {};
let adminSelectedGroup = null;

async function loadAdminData(){
  await loadGroups();
  adminAllData={};
  for(const code of Object.keys(GROUPS)){
    try{
      const snap=await getDoc(doc(db,'groups',code));
      if(snap.exists()) adminAllData[code]=snap.data();
    }catch(e){}
  }
  // Auto-saltar a la semana más reciente con datos
  const offsets = getWeeksWithDataOffsets();
  // offsets está ordenado descendente: [0, -1, -2, ...], el más reciente con datos es el primero negativo o 0
  // Queremos el offset más ALTO (más reciente) que tenga datos reales
  const allDates = new Set();
  Object.values(adminAllData).forEach(gd => {
    Object.keys(gd.records||{}).forEach(dk => allDates.add(dk));
  });
  if(allDates.size > 0){
    // Calcular el offset de la fecha más reciente con datos
    const today = new Date();
    const day = today.getDay();
    const monThis = new Date(today);
    monThis.setDate(today.getDate() - (day===0?6:day-1));
    monThis.setHours(0,0,0,0);
    const latestDate = [...allDates].sort().pop(); // fecha más reciente
    const d = new Date(latestDate+'T12:00:00');
    const dDay = d.getDay();
    const monD = new Date(d);
    monD.setDate(d.getDate()-(dDay===0?6:dDay-1));
    monD.setHours(0,0,0,0);
    const diffWeeks = Math.round((monThis-monD)/(7*24*60*60*1000));
    adminWeekOffset = -diffWeeks; // saltar directamente a la semana con datos más recientes
  }
  renderAdminTabs();
}

function sortedGroupCodes(){
  return Object.keys(GROUPS).sort((a,b)=>{
    const na=parseInt(a.replace(/\D/g,''))||0, nb=parseInt(b.replace(/\D/g,''))||0;
    if(na!==nb) return na-nb;
    return a.localeCompare(b);
  });
}

// ─── DETECCIÓN DE TENDENCIAS ──────────────────────────────────────
const LOW_EMOTIONS = ['tristeza','miedo','ira'];
const TREND_DAYS = 3; // días consecutivos para disparar alerta

function detectAlerts(players, records){
  // Recopilar todas las fechas con datos, ordenadas
  const allDates = Object.keys(records).sort();
  const alerts = [];
  players.forEach(player => {
    let streak = 0;
    let streakDates = [];
    allDates.forEach(dk => {
      const pd = records[dk] && records[dk][player];
      const emo = pd && (pd.post || pd.pre);
      if(emo && LOW_EMOTIONS.includes(emo.id)){
        streak++;
        streakDates.push({dk, icon: emo.icon, label: emo.label});
      } else {
        streak = 0;
        streakDates = [];
      }
    });
    if(streak >= TREND_DAYS){
      alerts.push({player, streak, streakDates: streakDates.slice(-streak)});
    }
  });
  return alerts;
}

function renderAlerts(alerts, groupName){
  if(!alerts.length) return '';
  const items = alerts.map(a => {
    const daysText = a.streakDates.map(d => `${d.icon} ${d.label}`).join(' → ');
    return `<div class="alert-card">
      <div class="alert-icon">⚠️</div>
      <div class="alert-body">
        <div class="alert-name">${a.player}</div>
        <div class="alert-desc">${a.streak} días seguidos con emoción baja</div>
        <div class="alert-days">${daysText}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="alert-section">
    <div class="alert-title">⚠️ Alertas de tendencia — ${groupName}</div>
    ${items}
  </div>`;
}

    console.log('Grupo '+code+' - días encontrados:', days.map(d=>d.key), '- todas las fechas en records:', Object.keys(records).sort());

    const dayTables=days.map(day=>{
      const dd=records[day.key]||{};
      const rr=resolutions[day.key]||{};
      const rows=players.filter(p=>dd[p]).map(p=>{
        const pd=dd[p],pre=pd.pre,post=pd.post;
        let change='\u2014';
        if(pre&&post){const diff=post.score-pre.score;change='<span class="'+( diff>0?'change-up':diff<0?'change-dn':'change-eq')+'">'+(diff>0?'\u2191 Mejora':diff<0?'\u2193 Baja':'\u2192 Igual')+'</span>';}

        '</tr>';
      }).join('');
      return '<div style="margin:0 16px 12px"><div style="font-size:13px;font-weight:600;color:#555;margin-bottom:6px">\uD83D\uDCC5 '+day.label+'</div>'+
        '<table class="record-table"><thead><tr><th>Jugador/a</th><th>Pre</th><th>Post</th><th></th><th style="min-width:140px">Resoluci\u00f3n</th></tr></thead><tbody>'+(rows||'<tr><td colspan="5" style="color:#aaa;font-style:italic;padding:10px">Sin datos</td></tr>')+'</tbody></table></div>';
    }).join('');

    const totalPre=days.reduce((a,day)=>{const dd=records[day.key]||{};return a+players.filter(p=>dd[p]&&dd[p].pre).length;},0);
    return '<div class="group-card">'+
      '<div class="group-card-header">'+
        '<span class="group-card-title">'+GROUPS[code]+'</span>'+
        '<span class="group-stats">'+players.length+' jugadores \u00b7 '+totalPre+' registros</span>'+
      '</div>'+
      (dayTables||'<div style="padding:16px;color:#aaa;font-size:13px">Sin registros para '+getWeekLabel(adminWeekOffset)+'</div>')+
    '</div>';
  }).join('');

  el.innerHTML = (alertsHtml ? '<div style="margin-bottom:8px">'+alertsHtml+'</div>' : '') +
    renderWeekNav() +
    groupsHtml;
}

// ─── NAVEGADOR DE SEMANAS ADMIN ──────────────────────────────────
// 0 = semana actual, -1 = semana pasada, -2 = hace dos semanas, etc.
let adminWeekOffset = 0;

function getMondayOfWeek(offset){
  const today = new Date();
  const day = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function getWeekKeys(offset){
  const mon = getMondayOfWeek(offset);
  const keys = [];
  for(let i = 0; i < 7; i++){
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    keys.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  return keys;
}

function getWeekLabel(offset){
  if(offset === 0) return 'Esta semana';
  if(offset === -1) return 'Semana pasada';
  const mon = getMondayOfWeek(offset);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const fmt = d => d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  return `${fmt(mon)} – ${fmt(sun)}`;
}

// Detecta qué semanas (offsets) tienen datos en cualquier grupo
function getWeeksWithData(){
  const allDates = new Set();
  Object.values(adminAllData).forEach(gd => {
    Object.keys(gd.records || {}).forEach(dk => allDates.add(dk));
  });
  if(!allDates.size) return [0];

  const sorted = [...allDates].sort();
  const earliest = new Date(sorted[0] + 'T12:00:00');
  const today = new Date();

  // Calcular lunes de la semana actual
  const day = today.getDay();
  const monThis = new Date(today);
  monThis.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
  monThis.setHours(0,0,0,0);

  const monEarliest = new Date(earliest);
  const dayE = monEarliest.getDay();
  monEarliest.setDate(monEarliest.getDate() - (dayE === 0 ? 6 : dayE - 1));
  monEarliest.setHours(0,0,0,0);

  const diffMs = monThis - monEarliest;
  const diffWeeks = Math.round(diffMs / (7 * 24 * 60 * 60 * 1000));

  const offsets = [];
  for(let i = 0; i >= -diffWeeks; i--) offsets.push(i);
  return offsets;
}

function getWeeksWithDataOffsets(){
  // Collect all date keys across all groups
  const allDates = new Set();
  Object.values(adminAllData).forEach(gd => {
    Object.keys(gd.records || {}).forEach(dk => allDates.add(dk));
  });
  if(!allDates.size) return [0];

  // Calculate offset of each date relative to current week's Monday
  const today = new Date();
  const day = today.getDay();
  const monThis = new Date(today);
  monThis.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
  monThis.setHours(0,0,0,0);

  const offsetSet = new Set([0]);
  allDates.forEach(dk => {
    const d = new Date(dk + 'T12:00:00');
    const dDay = d.getDay();
    const monD = new Date(d);
    monD.setDate(d.getDate() - (dDay === 0 ? 6 : dDay - 1));
    monD.setHours(0,0,0,0);
    const diffMs = monThis - monD;
    const diffWeeks = Math.round(diffMs / (7*24*60*60*1000));
    offsetSet.add(-diffWeeks);
  });

  return [...offsetSet].sort((a,b) => b-a); // descending: 0, -1, -2...
}

function renderWeekNav(){
  const offsets = getWeeksWithDataOffsets();
  const hasNext = adminWeekOffset < 0;
  const hasPrev = adminWeekOffset > Math.min(...offsets);

  const options = offsets.map(o =>
    `<option value="${o}" ${o===adminWeekOffset?'selected':''}>${getWeekLabel(o)}</option>`
  ).join('');

  return `<div id="week-nav" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
    <button onclick="changeAdminWeek(-1)" ${!hasPrev?'disabled':''} style="padding:6px 14px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;cursor:${hasPrev?'pointer':'not-allowed'};color:${hasPrev?'#1a1a2e':'#bbb'};font-size:13px">← Anterior</button>
    <select onchange="jumpToWeek(parseInt(this.value))" style="flex:1;padding:6px 10px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;font-size:13px;font-weight:600;color:#1a1a2e;text-align:center">${options}</select>
    <button onclick="changeAdminWeek(1)" ${!hasNext?'disabled':''} style="padding:6px 14px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;cursor:${hasNext?'pointer':'not-allowed'};color:${hasNext?'#1a1a2e':'#bbb'};font-size:13px">Siguiente →</button>
  </div>`;
}

window.changeAdminWeek = function(dir){
  adminWeekOffset += dir;
  renderAdminData();
};

window.jumpToWeek = function(offset){
  adminWeekOffset = offset;
  renderAdminData();
};

// ─── SWITCH ADMIN VIEW ───────────────────────────────────────────
window.switchAdminView = function(view){
  document.getElementById('admin-view-datos').style.display = view==='datos' ? 'block' : 'none';
  document.getElementById('admin-view-grupos').style.display = view==='grupos' ? 'block' : 'none';
  document.getElementById('btn-tab-datos').classList.toggle('active', view==='datos');
  document.getElementById('btn-tab-grupos').classList.toggle('active', view==='grupos');
  if(view==='grupos') renderGroupManage();
};

// ─── GESTIÓN DE GRUPOS ───────────────────────────────────────────
function renderGroupManage(){
  const list = document.getElementById('groups-manage-list');
  const codes = sortedGroupCodes();
  if(!codes.length){
    list.innerHTML='<div class="empty">No hay grupos aún.</div>';
    return;
  }
  list.innerHTML = sortedGroupCodes().map(code => `
    <div class="group-manage-row">
      <div class="group-manage-info">
        <span class="group-manage-code">${code}</span>
        <span class="group-manage-name">${GROUPS[code]}</span>
      </div>
      <button class="btn-del-group" onclick="deleteGroup('${code}')">✕ Eliminar</button>
    </div>`).join('');
}

window.addGroup = async function(){
  const codeInput = document.getElementById('new-group-code');
  const nameInput = document.getElementById('new-group-name');
  const errEl = document.getElementById('add-group-error');
  const code = codeInput.value.trim().toUpperCase().replace(/\s+/g,'');
  const name = nameInput.value.trim();
  errEl.style.display='none';
  if(!code){ errEl.textContent='El código no puede estar vacío.'; errEl.style.display='block'; return; }
  if(!name){ errEl.textContent='El nombre no puede estar vacío.'; errEl.style.display='block'; return; }
  if(GROUPS[code]){ errEl.textContent='Ese código ya existe.'; errEl.style.display='block'; return; }
  if(code === ADMIN_CODE){ errEl.textContent='Ese código está reservado.'; errEl.style.display='block'; return; }
  GROUPS[code] = name;
  await saveGroups();
  codeInput.value='';
  nameInput.value='';
  renderGroupManage();
};

window.deleteGroup = function(code){
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-inner').innerHTML=`
    <div style="text-align:center;padding:1rem 0.5rem">
      <div style="font-size:40px;margin-bottom:0.75rem">🗑️</div>
      <div style="font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:8px">Eliminar grupo</div>
      <div style="font-size:14px;color:#1a1a2e;font-weight:600;margin-bottom:4px">${GROUPS[code]} (${code})</div>
      <div style="font-size:13px;color:#888;margin-bottom:1.5rem">Los jugadores con este código ya no podrán entrar.<br>Los datos registrados se conservarán.</div>
      <button onclick="doDeleteGroup('${code}')" style="width:100%;padding:12px;background:#ef4444;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px">Sí, eliminar grupo</button>
      <button onclick="closeModal()" style="width:100%;padding:12px;border:1.5px solid #e5e5e5;border-radius:12px;background:#fff;font-size:15px;color:#888;cursor:pointer">Cancelar</button>
    </div>`;
};

window.doDeleteGroup = async function(code){
  delete GROUPS[code];
  await saveGroups();
  closeModal();
  renderGroupManage();
};

window.exportAdminExcel=function(){
  const wb=XLSX.utils.book_new();
  const raw=[['Grupo','Fecha','Día','Jugador','Pre-Emoción','Pre-Hora','Post-Emoción','Post-Hora','Cambio','Resolución']];
  sortedGroupCodes().forEach(code=>{
    const gd=adminAllData[code];if(!gd)return;
    const ps=gd.players||[],recs=gd.records||{},resols=gd.resolutions||{};
    Object.keys(recs).sort().forEach(dk=>{
      const dl=cap(new Date(dk+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long'}));
      ps.forEach(p=>{
        const pd=recs[dk][p];if(!pd)return;
        const pre=pd.pre,post=pd.post;
        const cambio=pre&&post?(post.score>pre.score?'Mejora':post.score<pre.score?'Baja':'Sin cambio'):'Incompleto';
        const resol=(resols[dk]&&resols[dk][p])||'';
        raw.push([GROUPS[code],dk,dl,p,pre?pre.label:'',pre?pre.time:'',post?post.label:'',post?post.time:'',cambio,resol]);
      });
    });
  });
  const ws=XLSX.utils.aoa_to_sheet(raw);
  ws['!cols']=[{wch:14},{wch:12},{wch:12},{wch:14},{wch:14},{wch:8},{wch:14},{wch:8},{wch:12},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Todos los grupos');
  XLSX.writeFile(wb,'emociones_ac_campus.xlsx');
};
